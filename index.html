<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منيو المطعم | Restaurant Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --yellow: #FFC107;
      --orange: #FF6B00;
      --black: #1A1A1A;
      --dark: #111111;
      --card-bg: #1E1E1E;
      --text-light: #F5F5F5;
      --text-muted: #AAAAAA;
      --border: #2E2E2E;
      --font-ar: 'Cairo', sans-serif;
      --font-en: 'Montserrat', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--text-light);
      font-family: var(--font-ar);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body.lang-en {
      font-family: var(--font-en);
      direction: ltr;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      aspect-ratio: 940 / 350;
      max-height: 380px;
      overflow: hidden;
      background: #222;
    }

    .hero-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.55) 100%);
    }

    /* ── LOGO ── */
    .logo-wrap {
      position: absolute;
      bottom: -48px;
      right: 50%;
      transform: translateX(50%);
      z-index: 10;
    }

    body.lang-en .logo-wrap {
      right: auto;
      left: 50%;
      transform: translateX(-50%);
    }

    .logo-wrap img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--yellow);
      box-shadow: 0 4px 24px rgba(255,193,7,0.35);
      display: block;
      image-rendering: -webkit-optimize-contrast;
    }

    /* ── LANG TOGGLE ── */
    .lang-toggle {
      position: absolute;
      top: 16px;
      left: 20px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      border: 1.5px solid var(--yellow);
      color: var(--yellow);
      padding: 6px 18px;
      border-radius: 24px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: var(--font-en);
      letter-spacing: 0.04em;
      transition: background 0.2s, color 0.2s;
      backdrop-filter: blur(4px);
    }

    .lang-toggle:hover {
      background: var(--yellow);
      color: var(--black);
    }

    /* ── MAIN WRAPPER ── */
    .main-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    /* ── SPACER for logo ── */
    .logo-spacer { height: 72px; }

    /* ── NAV BAR ── */
    .section-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
      border-bottom: 2.5px solid var(--orange);
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .section-nav::-webkit-scrollbar { display: none; }

    .nav-inner {
      display: flex;
      gap: 0;
      min-width: max-content;
      padding: 0 8px;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 14px 20px;
      cursor: pointer;
      white-space: nowrap;
      position: relative;
      transition: color 0.2s;
      letter-spacing: 0.01em;
    }

    .nav-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 3px;
      background: var(--yellow);
      transform: scaleX(0);
      transition: transform 0.22s;
    }

    .nav-btn:hover { color: var(--text-light); }
    .nav-btn.active { color: var(--yellow); }
    .nav-btn.active::after { transform: scaleX(1); }

    /* ── SECTION TITLE ── */
    .section-title-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 40px 0 22px;
    }

    .section-title-bar .line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--orange), transparent);
    }

    body.lang-en .section-title-bar .line {
      background: linear-gradient(90deg, transparent, var(--orange));
    }

    .section-title-bar .line.line-end {
      background: linear-gradient(90deg, transparent, var(--orange));
    }

    body.lang-en .section-title-bar .line.line-end {
      background: linear-gradient(90deg, var(--orange), transparent);
    }

    .section-title-bar h2 {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 900;
      color: var(--yellow);
      white-space: nowrap;
    }

    /* ── ITEMS GRID ── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
    }

    /* ── ITEM CARD ── */
    .item-card {
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .item-card:hover {
      transform: translateY(-4px);
      border-color: var(--orange);
      box-shadow: 0 8px 28px rgba(255,107,0,0.18);
    }

    .item-image {
      aspect-ratio: 4 / 3;
      background: #2a2a2a;
      overflow: hidden;
      flex-shrink: 0;
    }

    .item-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      transition: transform 0.3s;
    }

    .item-card:hover .item-image img {
      transform: scale(1.04);
    }

    .item-info {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .item-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-light);
      line-height: 1.4;
    }

    .item-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }

    .item-price {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 1rem;
      font-weight: 900;
      color: var(--yellow);
      margin-top: 4px;
    }

    .item-price span.currency {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--orange);
      opacity: 0.9;
    }

    /* ── NO IMAGE PLACEHOLDER ── */
    .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #222 0%, #2a2a2a 100%);
      font-size: 2.5rem;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: zoom-out;
      backdrop-filter: blur(6px);
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.7);
      image-rendering: -webkit-optimize-contrast;
    }

    .lightbox-close {
      position: absolute;
      top: 18px;
      right: 22px;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      background: rgba(0,0,0,0.5);
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lightbox-close:hover { background: var(--orange); }

    /* ── SECTION VISIBILITY ── */
    .menu-section { display: none; }
    .menu-section.active { display: block; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .hero { aspect-ratio: 16/9; max-height: 220px; }
      .logo-wrap img { width: 76px; height: 76px; }
      .logo-spacer { height: 56px; }
      .nav-btn { font-size: 0.8rem; padding: 12px 14px; }
      .items-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
      .item-name { font-size: 0.88rem; }
    }

    @media (min-width: 1100px) {
      .items-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    }
  </style>
</head>

/* ── STATE ── */
let currentLang = 'ar';
let activeSection = menuData[0].id;

/* ── EMOJI FALLBACKS ── */
const sectionEmoji = {
  'shawarma-single': '🌯',
  'shawarma-family': '🫕',
  'broasted': '🍗',
  'grills': '🔥',
  'snacks': '🍟',
  'starters': '🥗',
  'sauces': '🥫',
  'drinks': '🥤'
};

/* ── RENDER NAV ── */
function renderNav() {
  const nav = document.getElementById('navInner');
  nav.innerHTML = menuData.map(sec => `
    <button class="nav-btn ${sec.id === activeSection ? 'active' : ''}"
      onclick="showSection('${sec.id}')">
      ${currentLang === 'ar' ? sec.name_ar : sec.name_en}
    </button>
  `).join('');
}

/* ── RENDER MENU ── */
function renderMenu() {
  const content = document.getElementById('menuContent');
  content.innerHTML = menuData.map(sec => `
    <section class="menu-section ${sec.id === activeSection ? 'active' : ''}" id="sec-${sec.id}">
      <div class="section-title-bar">
        <div class="line"></div>
        <h2>${currentLang === 'ar' ? sec.name_ar : sec.name_en}</h2>
        <div class="line line-end"></div>
      </div>
      <div class="items-grid">
        ${sec.items.map((item, i) => renderCard(item, i)).join('')}
      </div>
    </section>
  `).join('');
}

function renderCard(item, i) {
  const name = currentLang === 'ar' ? item.name_ar : item.name_en;
  const desc = currentLang === 'ar' ? item.desc_ar : item.desc_en;
  const currency = currentLang === 'ar' ? 'د.أ' : 'JOD';
  const imgHtml = item.img
    ? `<img src="${item.img}" alt="${name}" loading="lazy" decoding="async" onclick="openLightbox('${item.img}', '${name.replace(/'/g,"&#39;")}')" />`
    : `<div class="no-img" title="${name}">${sectionEmoji[item._section] || '🍽️'}</div>`;

  return `
    <div class="item-card">
      <div class="item-image">${imgHtml}</div>
      <div class="item-info">
        <div class="item-name">${name}</div>
        <div class="item-desc">${desc}</div>
        <div class="item-price">${item.price} <span class="currency">${currency}</span></div>
      </div>
    </div>
  `;
}

/* ── SECTION SWITCH ── */
function showSection(id) {
  activeSection = id;
  renderNav();
  renderMenu();
  // Scroll nav btn into view
  const activeBtn = document.querySelector('.nav-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

/* ── LANG TOGGLE ── */
function toggleLang() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.body.classList.toggle('lang-en', currentLang === 'en');
  document.getElementById('langBtn').textContent = currentLang === 'ar' ? 'EN' : 'ع';
  renderNav();
  renderMenu();
}

/* ── LIGHTBOX ── */
function openLightbox(src, alt) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxImg').alt = alt;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; } });

/* ── INIT ── */
renderNav();
renderMenu();
</script>
